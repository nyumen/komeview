name: Release

# v で始まるタグ（例: v1.0.0）を push するとビルドして Release に添付する
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    # macos-latest は Apple Silicon(arm64)。arm64 の dmg を生成する。
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/*.dmg

  build-win:
    # windows-latest(x64) で x64 のポータブル exe を生成する。
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: release/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
